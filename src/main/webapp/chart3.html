<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>동북아 LNG 수요 차트</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
    }
    #chart-container {
      width: 900px;
      margin: 40px auto;
    }
    #controls {
      width: 900px;
      margin: 10px auto;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="controls">
  <label>곡률 (tension): </label>
  <input type="range" id="tensionSlider" min="0" max="1" step="0.01" value="0.3">
  <span id="tensionValue">0.3</span>
</div>

<div id="chart-container">
  <canvas id="lngChart"></canvas>
</div>

<script>
  const rawData = {
    "2/1/26": 19.5, "2/2/26": 19.4, "2/3/26": 19.2, "2/4/26": 19,
    "2/5/26": 19, "2/6/26": 19.3, "2/7/26": 19.8, "2/8/26": 20.1,
    "2/9/26": 20.5, "2/10/26": 19.8, "2/11/26": 19, "2/12/26": 20.6,
    "2/13/26": 22, "2/14/26": 22.2, "2/15/26": 22.2, "2/16/26": 22.7,
    "2/17/26": 23.5, "2/18/26": 23.7, "2/19/26": 24, "2/20/26": 24,
    "2/21/26": 24.3, "2/22/26": 24.3, "2/23/26": 24.5, "2/24/26": 24.3,
    "2/25/26": 24.1, "2/26/26": 24, "2/27/26": 24.2, "2/28/26": 23.7,
    "3/1/26": 23.3, "3/2/26": 23.1, "3/3/26": 22.8, "3/4/26": 22.9,
    "3/5/26": 23, "3/6/26": 22.8, "3/7/26": 22.7, "3/8/26": 22.5,
    "3/9/26": 21.7, "3/10/26": 22.5
  };

  function formatDate(dateStr) {
    const [month, day, year] = dateStr.split('/');
    return `${year}.${parseInt(month)}.${parseInt(day)}`;
  }

  const labels = Object.keys(rawData).map(formatDate);
  const values = Object.values(rawData);

  const ctx = document.getElementById('lngChart').getContext('2d');

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        borderColor: '#555',
        borderWidth: 3,
        tension: 0.3,
        pointRadius: (ctx) => ctx.dataIndex === values.length - 1 ? 6 : 0,
        pointBackgroundColor: (ctx) => ctx.dataIndex === values.length - 1 ? 'green' : 'transparent'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: '동북아 LNG 수요 (단위: Mt)',
          font: { size: 20 }
        }
      },
      scales: {
        y: {
          min: 10,
          max: 30,
          ticks: { stepSize: 5 }
        },
        x: {
          ticks: { maxTicksLimit: 8 },
          grid: { display: false }
        }
      }
    },
    plugins: [{
      id: 'customText',
      afterDraw(chart) {
        const {ctx} = chart;
        ctx.save();
        ctx.font = '16px Arial';
        ctx.fillStyle = 'green';

        ctx.fillText('|Z| : 1.7', 80, 350);
        ctx.fillText('Spike Point', 650, 150);
        ctx.fillText('(26.3.10)', 650, 170);

        ctx.restore();
      }
    }]
  });

  // 슬라이더 이벤트
  const slider = document.getElementById('tensionSlider');
  const valueText = document.getElementById('tensionValue');

  slider.addEventListener('input', function() {
    const val = parseFloat(this.value);
    chart.data.datasets[0].tension = val;
    chart.update();
    valueText.textContent = val.toFixed(2);
  });

</script>

</body>
</html>
